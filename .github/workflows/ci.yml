name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Run contract tests
        run: npm test

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted
          Install-Module PSScriptAnalyzer -Scope CurrentUser -Force

      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $files = @(
            "./install.ps1",
            "./scripts/prepare-offline-cache.ps1",
            "./scripts/install-unreal-mcp-bridge.ps1"
          )
          foreach ($file in $files) {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile((Resolve-Path $file), [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              $errors | Format-List | Out-String | Write-Error
            }
          }

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Invoke-ScriptAnalyzer -Path ./install.ps1, ./scripts/prepare-offline-cache.ps1, ./scripts/install-unreal-mcp-bridge.ps1 -Recurse -Severity Error

      - name: Validate installer dry-run
        shell: pwsh
        run: ./install.ps1 -DryRun -IncludeWsl
